<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#d50000" />
  <link rel="manifest" href="manifest.json?v=2.6" />
  <link rel="icon" href="assets/icon-192.png" />
  <title>Lopes Serviços Mecânicos</title>

  <link rel="stylesheet" href="styles.css?v=2.6" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="assets/logo.png" alt="Lopes Serviços Mecânicos" />
      <div class="brand-text">
        <div class="brand-title">Lopes Serviços Mecânicos</div>
        <div class="brand-sub">Leme/SP • (19) 99772-6572</div>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn ghost" id="btnSync" title="Sincronizar">☁️</button>
      <button class="btn ghost" id="btnConfig" title="Configurações">⚙️</button>
    </div>
  </header>

  <main class="layout">
    <section class="card search">
      <div class="row">
        <input id="q" class="input" placeholder="Buscar por placa, cliente ou telefone…" />
        <button id="btnNewOS" class="btn primary">Nova OS</button>
      </div>
      <div class="chips" id="quickChips"></div>
    </section>

    <section class="grid">
      <section class="card">
        <div class="card-h">
          <h2>Clientes</h2>
          <button class="btn" id="btnNewClient">+ Cliente</button>
        </div>
        <div id="clientsList" class="list"></div>
      </section>

      <section class="card">
        <div class="card-h">
          <h2>Veículos</h2>
          <button class="btn" id="btnNewVehicle">+ Veículo</button>
        </div>
        <div id="vehiclesList" class="list"></div>
      </section>

      <section class="card">
        <div class="card-h" style="gap:12px; align-items:flex-start;">
          <div>
            <h2>Serviços / OS</h2>
            <div class="muted">Troca de óleo calcula por data e km (o que vencer primeiro).</div>
          </div>
          <div class="spacer"></div>
          <button class="btn" id="btnCash">💰 Caixa</button>
        </div>
        <div id="servicesList" class="list"></div>
      </section>
    </section>
  </main>

  <!-- MODALS -->
  <div class="modal" id="modalBackdrop" hidden></div>

  <!-- CLIENTE -->
  <div class="modal-card" id="modalClient" hidden>
    <div class="modal-h">
      <h3 id="clientTitle">Cliente</h3>
      <button type="button" class="btn ghost" data-close>✕</button>
    </div>
    <div class="modal-b">
      <div class="form">
        <label>Nome</label>
        <input id="clientNome" class="input" />
        <label>WhatsApp</label>
        <input id="clientWhats" class="input" placeholder="ex: 19997726572" />
        <label>Observações</label>
        <textarea id="clientObs" class="input" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-f">
      <button class="btn danger" id="clientDelete">Excluir</button>
      <div class="spacer"></div>
      <button type="button" class="btn" data-close>Cancelar</button>
      <button class="btn primary" id="clientSave">Salvar</button>
    </div>
  </div>

  <!-- VEICULO -->
  <div class="modal-card" id="modalVehicle" hidden>
    <div class="modal-h">
      <h3 id="vehicleTitle">Veículo</h3>
      <button type="button" class="btn ghost" data-close>✕</button>
    </div>

    <div class="modal-b">
      <div class="form">
        <label>Cliente</label>
        <select id="vehicleCliente" class="input"></select>

        <label>Placa</label>
        <input id="vehiclePlaca" class="input" placeholder="ABC1D23" />

        <label>Marca</label>
        <input id="vehicleMarca" class="input" placeholder="ex: Volkswagen" list="dlMarcas" />
        <datalist id="dlMarcas"></datalist>

        <label>Modelo</label>
        <input id="vehicleModelo" class="input" placeholder="ex: Gol 1.6" list="dlModelos" />
        <datalist id="dlModelos"></datalist>

        <label>Ano</label>
        <input id="vehicleAno" class="input" placeholder="ex: 2015" />

        <label>KM Atual</label>
        <input id="vehicleKm" class="input" type="number" min="0" />

        <label>Observações</label>
        <textarea id="vehicleObs" class="input" rows="3"></textarea>
      </div>
    </div>

    <div class="modal-f">
      <button class="btn danger" id="vehicleDelete">Excluir</button>
      <div class="spacer"></div>
      <button type="button" class="btn" data-close>Cancelar</button>
      <button class="btn primary" id="vehicleSave">Salvar</button>
    </div>
  </div>

  <!-- ORDEM DE SERVIÇO -->
  <!-- (todo seu código da OS permanece igual) -->

  <!-- PRINT TEMPLATE -->
  <div id="printArea" class="print-area" hidden></div>

  <!-- APP JS carregado no final -->
  <script src="app.js?v=2.6"></script>

</body>
</html>
